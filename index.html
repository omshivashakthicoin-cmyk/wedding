<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Texture Challenge - Pen #9 - 2020</title>
    <script src="https://kit.fontawesome.com/e2ac9cc532.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
  </head>
    
  <body>
  <div class="container">
  <div class="contents">
    <div class="one">
      <h2>Together with their parents</h2>
      <!-- Wrapped names in a container for the internal scrolling effect -->
      <div class="marquee-container">
        <div class="marquee-text">
          <h1>Lalitha</h1>
          <h1 class="large-font gold-gradient accent-font">&</h1>
          <h1>Srinu</h1>
        </div>
      </div>
    </div>
    <div class="two">
      <h2>request the pleasure of your company </h2>
      <h2>to celebrate their marriage</h2>
    </div>
    <div class="three">
      <h1>THURSDAY,</h1>
      <h1>JULY</h1>
      <div class="date accent-font">
        <div class="year-one">
          <h2>2</h2>
          <h2>0</h2>
        </div>
        <div class="day">
          <h2>02</h2>
        </div>
        <div class="year-two">
          <h2>2</h2>
          <h2>6</h2>
        </div>
      </div>
      <h2>at 4 o'clock</h2>
    </div>
    <div class="four">
      <!-- Added Google Maps link for Hyderabad and a class for the blinking effect -->
      <a href="https://maps.app.goo.gl/GPWZGLAP74R5STj26" target="_blank" class="location-link">
        <h1>AARSADA </h1>
        <h1>BALIGUI PETA MANDALAM</h1>
        <h2>RAJAM LINE</h2>
        <h2>SRIKAKULAM, Andhra Pradesh, India</h2>
      </a>
    </div>
    <div class="five">
      <h1>DINNER + DRINKS TO FOLLOW</h1>
      <h1><i class="fas fa-utensils"></i>&nbsp;&nbsp;+&nbsp;&nbsp;<i class="fas fa-cocktail"></i></h1>
      <!-- The deadline will be updated dynamically via JS -->
      <h2 id="rsvp-deadline">Kindly respond by...</h2>
    </div>
  </div>
</div>

<script>
  // Wedding Date: July 2, 2026
  const weddingDate = new Date("2026-07-02T00:00:00");
  
  function updateCountdownDeadline() {
    const now = new Date();
    const timeDiff = weddingDate - now;
    const rsvpElement = document.getElementById("rsvp-deadline");

    if (timeDiff <= 0) {
      rsvpElement.innerText = "The wedding day has arrived!";
      return;
    }

    // Calculate days, hours, and minutes remaining until the wedding
    const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));

    // Update the RSVP text to act as a countdown
    rsvpElement.innerText = `Kindly respond within the next: ${days}d ${hours}h ${minutes}m`;
  }

  // Run immediately and update every minute
  updateCountdownDeadline();
  setInterval(updateCountdownDeadline, 60000);
</script>
    
  </body>
</html>
