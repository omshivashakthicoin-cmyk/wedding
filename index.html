<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <script src="https://kit.fontawesome.com/e2ac9cc532.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>

    <div class="card-container">
      
      <div class="section intro-section">
        <h2>Together with their parents</h2>
        <div class="marquee-box">
          <div class="marquee-content">
            <span class="name">Lalitha</span>
            <span class="ampersand">&</span>
            <span class="name">Srinu</span>
          </div>
        </div>
      </div>

      <div class="section divider-top">
        <h2>request the pleasure of your company</h2>
        <h2>to celebrate their marriage</h2>
      </div>

      <div class="section divider-top blink-effect">
        <h1>Thursday, July</h1>
        <div class="date-display">
          <div class="year-digit">2<br>0</div>
          <div class="day-digit">02</div>
          <div class="year-digit">2<br>6</div>
        </div>
        <h2>at 4 o'clock</h2>
      </div>

      <a href="https://www.google.com/maps/search/?api=1&query=Botanical+Gardens+Hyderabad" target="_blank" class="location-card blink-effect">
        <h1>Botanical Gardens</h1>
        <h2>6700 Azalea Garden Rd</h2>
        <h2>Hyderabad, India</h2>
      </a>

      <div class="section divider-top">
        <h1>Dinner + Drinks to Follow</h1>
        <div class="icons">
          <i class="fas fa-utensils"></i> &nbsp;+&nbsp; <i class="fas fa-cocktail"></i>
        </div>
        <h2 id="countdown-timer">Calculating RSVP deadline...</h2>
      </div>

    </div>

    <script>
      const weddingDate = new Date("2026-07-02T16:00:00");
      
      function updateCountdown() {
        const now = new Date();
        const diff = weddingDate - now;
        const timerElement = document.getElementById("countdown-timer");

        if (diff <= 0) {
          timerElement.innerText = "The wedding day has arrived!";
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

        timerElement.innerText = `Kindly respond within: ${days}d ${hours}h ${minutes}m`;
      }

      updateCountdown();
      setInterval(updateCountdown, 60000);
    </script>
  </body>
</html>
